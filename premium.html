<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI Comment Moderator — Premium</title>
  <link rel="stylesheet" href="premium.css">
</head>
<body class="premium-page">

  <!-- El contenido es idéntico al de la pestaña "Premium" del popup.
       Los textos se rellenan desde premium.js según el idioma guardado. -->
  <div class="premium-content">
    <span class="premium-badge-lg" data-i18n="prem_badge">Premium</span>
    <h1 class="premium-title" data-i18n="prem_title">Coming soon in Premium</h1>
    <p class="premium-sub" data-i18n="prem_sub">Soon in Premium you'll be able to:</p>

    <ul class="premium-list">
      <li>
        <span class="prem-check">✓</span>
        <span class="prem-feat-text" data-i18n-html="prem_feat1"></span>
      </li>
      <li>
        <span class="prem-check">✓</span>
        <span class="prem-feat-text" data-i18n-html="prem_feat2"></span>
      </li>
      <li>
        <span class="prem-check">✓</span>
        <div>
          <span class="prem-feat-text" data-i18n-html="prem_feat3"></span>
          <div class="prem-rules">
            <span class="prem-rule">
              <b data-i18n="prem_eg_insults">Insults</b>
              <span class="prem-arrow">→</span>
              <span class="prem-act prem-hide" data-i18n="prem_act_hide">Hide</span>
            </span>
            <span class="prem-rule">
              <b data-i18n="prem_eg_questions">Questions</b>
              <span class="prem-arrow">→</span>
              <span class="prem-act prem-show" data-i18n="prem_act_show">Show</span>
            </span>
            <span class="prem-rule">
              <b data-i18n="prem_eg_brands">Collaboration / brands</b>
              <span class="prem-arrow">→</span>
              <span class="prem-act prem-feature" data-i18n="prem_act_feature">Highlight</span>
            </span>
          </div>
        </div>
      </li>
    </ul>

    <p class="premium-footer" data-i18n="prem_footer"></p>
  </div>

  <script src="settings.js"></script>
  <script src="i18n.js"></script>
  <script src="premium.js"></script>
</body>
</html>
